<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="offline-title">Offline | Nabha Learning</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9fafb;
            color: #111827;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            background: white;
            padding: 40px;
            border-radius: 24px;
            shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            border: 1px solid #e5e7eb;
        }
        .icon {
            font-size: 64px;
            margin-bottom: 24px;
            display: block;
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #4f46e5;
        }
        p {
            font-size: 16px;
            line-height: 1.5;
            color: #4b5563;
            margin-bottom: 32px;
        }
        .btn {
            display: inline-block;
            background-color: #4f46e5;
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            transition: background-color 0.2s;
        }
        .btn:hover {
            background-color: #4338ca;
        }
        .footer {
            margin-top: 32px;
            font-size: 14px;
            color: #9ca3af;
        }
    </style>
</head>
<body>
    <div class="container">
        <span class="icon">📡❌</span>
        <h1 id="offline-heading">You're Offline</h1>
        <p id="offline-text">It looks like you've lost your connection. Don't worry, you can still access your already cached lessons!</p>
        <a href="/" class="btn" id="offline-button">Go to Dashboard</a>
        <div class="footer" id="offline-footer">
            &copy; 2026 Nabha Digital Learning
        </div>
    </div>
    <script>
        const i18n = {
            en: {
                title: 'Offline | Nabha Learning',
                heading: "You're Offline",
                text: "It looks like you've lost your connection. Don't worry, you can still access your already cached lessons!",
                button: 'Go to Dashboard',
                footer: '© 2026 Nabha Digital Learning',
            },
            hi: {
                title: 'ऑफलाइन | नाभा लर्निंग',
                heading: 'आप ऑफलाइन हैं',
                text: 'लगता है आपका कनेक्शन टूट गया है। चिंता न करें, आप पहले से कैश किए गए पाठ अभी भी देख सकते हैं।',
                button: 'डैशबोर्ड पर जाएं',
                footer: '© 2026 नाभा डिजिटल लर्निंग',
            },
            pa: {
                title: 'ਆਫਲਾਈਨ | ਨਾਭਾ ਲਰਨਿੰਗ',
                heading: 'ਤੁਸੀਂ ਆਫਲਾਈਨ ਹੋ',
                text: 'ਲੱਗਦਾ ਹੈ ਤੁਹਾਡਾ ਕਨੈਕਸ਼ਨ ਟੁੱਟ ਗਿਆ ਹੈ। ਚਿੰਤਾ ਨਾ ਕਰੋ, ਤੁਸੀਂ ਪਹਿਲਾਂ ਤੋਂ ਕੈਸ਼ ਕੀਤੇ ਪਾਠ ਵੇਖ ਸਕਦੇ ਹੋ।',
                button: 'ਡੈਸ਼ਬੋਰਡ ਤੇ ਜਾਓ',
                footer: '© 2026 ਨਾਭਾ ਡਿਜੀਟਲ ਲਰਨਿੰਗ',
            },
        };

        const locale = localStorage.getItem('applocale') || 'en';
        const text = i18n[locale] || i18n.en;

        document.documentElement.lang = locale;
        document.getElementById('offline-title').textContent = text.title;
        document.getElementById('offline-heading').textContent = text.heading;
        document.getElementById('offline-text').textContent = text.text;
        document.getElementById('offline-button').textContent = text.button;
        document.getElementById('offline-footer').textContent = text.footer;

        window.addEventListener('online', () => {
            window.location.reload();
        });
    </script>
</body>
</html>
